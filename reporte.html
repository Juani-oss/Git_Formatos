<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte de Soporte Técnico</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #0a2540;
    --azul-medio: #1a3a5c;
    --acento: #00bfae;
    --acento2: #e8f7f6;
    --gris: #f7f9fc;
    --borde: #d0dce8;
    --texto: #1a2a3a;
    --muted: #607080;
    --radio: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--gris);
    color: var(--texto);
    padding: 30px 20px 60px;
    min-height: 100vh;
  }

  /* ── PAGE WRAPPER ── */
  .page {
    max-width: 860px;
    margin: auto;
  }

  /* ── TÍTULO APP ── */
  .app-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--borde);
  }

  /* ── CARD ── */
  .card {
    background: white;
    border: 1px solid var(--borde);
    border-radius: var(--radio);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .card-header {
    background: var(--azul);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .card-header .num {
    background: var(--acento);
    color: var(--azul);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .card-body {
    padding: 20px;
  }

  /* ── ENCABEZADO VISUAL ── */
  .enc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .enc-grid .full { grid-column: 1 / -1; }

  /* ── APARTADOS DINÁMICOS ── */
  .apartados-lista {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .apartado-item {
    display: grid;
    grid-template-columns: 160px 1fr auto;
    gap: 10px;
    align-items: start;
    background: var(--gris);
    border: 1px solid var(--borde);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .apartado-item textarea {
    resize: vertical;
    min-height: 60px;
  }

  .btn-remove {
    background: #fee2e2;
    color: #b91c1c;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Sora', sans-serif;
    transition: background .2s;
    white-space: nowrap;
  }
  .btn-remove:hover { background: #fca5a5; }

  .btn-add {
    background: var(--acento2);
    color: var(--azul-medio);
    border: 1.5px dashed var(--acento);
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: background .2s;
  }
  .btn-add:hover { background: #b2ede8; }

  /* ── INPUTS GLOBALES ── */
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    border: 1px solid var(--borde);
    border-radius: 7px;
    padding: 9px 12px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    color: var(--texto);
    background: white;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"]:focus, input[type="date"]:focus,
  textarea:focus, select:focus {
    border-color: var(--acento);
    box-shadow: 0 0 0 3px rgba(0,191,174,.15);
  }

  /* ── FIRMAS ── */
  .firmas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .firma-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .firma-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--azul);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  canvas {
    border: 1.5px solid var(--borde);
    border-radius: 8px;
    background: #fafcfe;
    width: 100%;
    touch-action: none;
    cursor: crosshair;
  }

  .firma-hint {
    font-size: 11px;
    color: var(--muted);
    align-self: flex-start;
  }

  .btn-limpiar {
    background: white;
    color: var(--muted);
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    align-self: flex-start;
    transition: background .2s, color .2s;
  }
  .btn-limpiar:hover { background: var(--gris); color: var(--azul); }

  /* ── BOTÓN PDF ── */
  .btn-pdf {
    width: 100%;
    padding: 15px;
    background: var(--azul);
    color: white;
    border: none;
    border-radius: var(--radio);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .2s, transform .1s;
  }
  .btn-pdf:hover { background: var(--azul-medio); }
  .btn-pdf:active { transform: scale(.98); }

  .svg-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── PREVIEW DEL DOCUMENTO ── */
  #preview-doc {
    display: none;
    position: fixed;
    left: -9999px;
    top: 0;
    width: 794px;
    background: white;
    padding: 40px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: #111;
  }

  @media (max-width: 600px) {
    .enc-grid { grid-template-columns: 1fr; }
    .firmas-grid { grid-template-columns: 1fr; }
    .apartado-item { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="app-title">Acta de soportes </div>

  <!-- ① ENCABEZADO DEL REPORTE -->
  <div class="card">
    <div class="card-header">
      <span class="num">1</span> Encabezado
    </div>
    <div class="card-body">
      <div class="enc-grid">
        <div>
          <label>Nombre del usuario</label>
          <input type="text" id="empresa" placeholder="Ej: Corporación XYZ S.A.">
        </div>
        <div>
          <label>N° de tarea</label>
          <input type="text" id="nro_reporte" placeholder="Ej: RPT-2025-001">
        </div>
        <div>
          <label>Técnico responsable</label>
          <input type="text" id="tecnico" placeholder="Nombre completo"> 
        </div>
        <div>
          <label>Fecha Inicio</label>
          <input type="date" id="fecha">
        </div>
        <div>
          <label>Fecha Fin</label>
          <input type="date" id="fecha_fin">
        </div>
        <div>
          <label>Cliente</label>
          <input type="text" id="cliente" placeholder="Nombre del cliente">
        </div>
        <div>
          <label>Ubicación / Sede</label>
          <input type="text" id="ubicacion" placeholder="Ej: Piso 3, Edificio A">
        </div>
        <div class="full">
          <label>Título del Reporte</label>
          <input type="text" id="titulo_reporte" placeholder="Ej: Mantenimiento preventivo de red LAN">
        </div>
      </div>
    </div>
  </div>

  <!-- ② APARTADOS DE CONTENIDO -->
  <div class="card">
    <div class="card-header">
      <span class="num">2</span> Apartados del Documento
    </div>
    <div class="card-body">
      <div class="apartados-lista" id="apartados-lista"></div>
      <button class="btn-add" onclick="agregarApartado()">+ Agregar apartado</button>
    </div>
  </div>

  <!-- ③ FIRMAS -->
  <div class="card">
    <div class="card-header">
      <span class="num">3</span> Firmas
    </div>
    <div class="card-body">
      <div class="firmas-grid">
        <div class="firma-box">
          <span class="firma-label">Técnico</span>
          <canvas id="firmaTecnico" width="340" height="130"></canvas>
          <span class="firma-hint">Dibuja tu firma con el mouse o dedo</span>
          <button class="btn-limpiar" onclick="limpiar('firmaTecnico')">✕ Limpiar</button>
        </div>
        <div class="firma-box">
          <span class="firma-label">Cliente conforme</span>
          <canvas id="firmaCliente" width="340" height="130"></canvas>
          <span class="firma-hint">Dibuja tu firma con el mouse o dedo</span>
          <button class="btn-limpiar" onclick="limpiar('firmaCliente')">✕ Limpiar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTÓN PDF -->
  <button class="btn-pdf" onclick="generarPDF()">
    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    Generar PDF
  </button>
</div>

<!-- NODO OCULTO PARA RENDERIZAR EL PDF -->
<div id="preview-doc"></div>

<script>
// ── FECHA POR DEFECTO ────────────────────────────────────────
document.getElementById('fecha').valueAsDate = new Date();

// ── APARTADOS ────────────────────────────────────────────────
let contadorApartados = 0;

function agregarApartado(titulo = '', contenido = '') {
  contadorApartados++;
  const id = 'apt_' + contadorApartados;
  const lista = document.getElementById('apartados-lista');

  const div = document.createElement('div');
  div.className = 'apartado-item';
  div.dataset.id = id;
  div.innerHTML = `
    <div>
      <label>Título</label>
      <input type="text" class="apt-titulo" placeholder="Ej: Trabajo realizado" value="${titulo}">
    </div>
    <div>
      <label>Contenido</label>
      <textarea class="apt-contenido" placeholder="Describe el contenido de este apartado...">${contenido}</textarea>
    </div>
    <button class="btn-remove" onclick="this.closest('.apartado-item').remove()">✕ Quitar</button>
  `;
  lista.appendChild(div);
}

// Apartados por defecto
agregarApartado('Trabajo Realizado','');
agregarApartado('Observaciones', '');
agregarApartado('Recomendaciones', '');

// ── CANVAS — FIRMAS ──────────────────────────────────────────
function activarCanvas(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  let dibujando = false;

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width / r.width;
    const scaleY = canvas.height / r.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - r.left) * scaleX,
        y: (e.touches[0].clientY - r.top) * scaleY
      };
    }
    return {
      x: (e.clientX - r.left) * scaleX,
      y: (e.clientY - r.top) * scaleY
    };
  }

  function start(e) {
    e.preventDefault();
    dibujando = true;
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function move(e) {
    e.preventDefault();
    if (!dibujando) return;
    const p = pos(e);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#0a2540';
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }
  function stop() { dibujando = false; ctx.beginPath(); }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop);
}

function limpiar(id) {
  const c = document.getElementById(id);
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

activarCanvas('firmaTecnico');
activarCanvas('firmaCliente');

// ── GENERAR PDF ──────────────────────────────────────────────
function generarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  const empresa    = document.getElementById('empresa').value    || 'N/A';
  const nroReporte = document.getElementById('nro_reporte').value || 'N/A';
  const tecnico    = document.getElementById('tecnico').value    || 'N/A';
  const fecha      = document.getElementById('fecha').value      || 'N/A';
  const fecha_fin     = document.getElementById('fecha_fin').value  || 'N/A';
  const cliente    = document.getElementById('cliente').value    || 'N/A';
  const ubicacion  = document.getElementById('ubicacion').value  || 'N/A';
  const titulo     = document.getElementById('titulo_reporte').value || 'Reporte de Soporte Técnico';

  const firmaTecnico = document.getElementById('firmaTecnico').toDataURL('image/png');
  const firmaCliente = document.getElementById('firmaCliente').toDataURL('image/png');

  const PW = 210; // A4 ancho mm
  const PH = 297; // A4 alto mm
  const ML = 15;  // margen izq
  const MR = 15;  // margen der
  const CW = PW - ML - MR; // ancho contenido

  let y = 0;

  // ── ENCABEZADO AZUL ──
  doc.setFillColor(10, 37, 64);
  doc.rect(0, 0, PW, 38, 'F');

  // Línea acento teal
  doc.setFillColor(0, 191, 174);
  doc.rect(0, 38, PW, 3, 'F');

  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(17);
  doc.text(titulo, ML, 16);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text(empresa, ML, 25);
  doc.text(`N° ${nroReporte}`, ML, 31);

  // Fecha top-right
  doc.setFontSize(9);
  doc.text(fecha, PW - MR, 25, { align: 'right' });

  y = 50;

  // ── DATOS GENERALES ──
  doc.setTextColor(10, 37, 64);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('DATOS GENERALES', ML, y);

  // Línea bajo título sección
  doc.setDrawColor(0, 191, 174);
  doc.setLineWidth(0.5);
  doc.line(ML, y + 2, ML + CW, y + 2);
  y += 8;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(30, 50, 70);

  const campos = [
    ['Técnico responsable', tecnico],
    ['Cliente', cliente],
    ['Ubicación / Sede', ubicacion],
    ['Fecha', fecha],
    ['Fecha_fin', fecha_fin],
  ];

  // Dos columnas
  const col1 = campos.slice(0, 2);
  const col2 = campos.slice(2, 4);
  const colW = CW / 2 - 5;

  function renderCampos(arr, xBase) {
    let yy = y;
    arr.forEach(([etiqueta, valor]) => {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(100, 120, 140);
      doc.text(etiqueta.toUpperCase(), xBase, yy);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(10, 37, 64);
      doc.text(valor, xBase, yy + 5);
      yy += 13;
    });
    return yy;
  }

  const y1 = renderCampos(col1, ML);
  const y2 = renderCampos(col2, ML + colW + 10);
  y = Math.max(y1, y2) + 4;

  // ── APARTADOS ──
  const items = document.querySelectorAll('.apartado-item');
  items.forEach(item => {
    const tituloApt   = item.querySelector('.apt-titulo').value || 'Sin título';
    const contenidoApt = item.querySelector('.apt-contenido').value || '';

    if (y > PH - 60) {
      doc.addPage();
      y = 20;
    }

    // Cabecera apartado
    doc.setFillColor(231, 244, 255);
    doc.roundedRect(ML, y, CW, 8, 2, 2, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(10, 37, 64);
    doc.text(tituloApt.toUpperCase(), ML + 4, y + 5.5);
    y += 12;

    // Contenido multilinea
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(30, 50, 70);
    if (contenidoApt.trim()) {
      const lineas = doc.splitTextToSize(contenidoApt, CW);
      lineas.forEach(linea => {
        if (y > PH - 50) { doc.addPage(); y = 20; }
        doc.text(linea, ML, y);
        y += 6;
      });
    } else {
      // Líneas vacías para rellenar a mano
      for (let i = 0; i < 3; i++) {
        doc.setDrawColor(200, 210, 220);
        doc.setLineWidth(0.3);
        doc.line(ML, y + 4, ML + CW, y + 4);
        y += 8;
      }
    }
    y += 6;
  });

  // ── FIRMAS ──
  if (y > PH - 60) { doc.addPage(); y = 20; }

  y += 5;
  doc.setDrawColor(200, 210, 220);
  doc.setLineWidth(0.3);
  doc.line(ML, y, ML + CW, y);
  y += 8;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(10, 37, 64);
  doc.text('FIRMAS', ML, y);
  doc.setDrawColor(0, 191, 174);
  doc.setLineWidth(0.5);
  doc.line(ML, y + 2, ML + CW, y + 2);
  y += 10;

  const firmaW = 75;
  const firmaH = 35;
  const x1 = ML;
  const x2 = PW - MR - firmaW;

  // Cajas de firma
  doc.setDrawColor(180, 195, 210);
  doc.setLineWidth(0.4);
  doc.rect(x1, y, firmaW, firmaH);
  doc.rect(x2, y, firmaW, firmaH);

  doc.addImage(firmaTecnico, 'PNG', x1 + 2, y + 2, firmaW - 4, firmaH - 4);
  doc.addImage(firmaCliente, 'PNG', x2 + 2, y + 2, firmaW - 4, firmaH - 4);

  y += firmaH + 4;

  doc.setDrawColor(180, 195, 210);
  doc.setLineWidth(0.3);
  doc.line(x1, y, x1 + firmaW, y);
  doc.line(x2, y, x2 + firmaW, y);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(10, 37, 64);
  doc.text(tecnico, x1 + firmaW / 2, y + 5, { align: 'center' });
  doc.text(cliente, x2 + firmaW / 2, y + 5, { align: 'center' });

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(100, 120, 140);
  doc.text('Técnico Responsable', x1 + firmaW / 2, y + 10, { align: 'center' });
  doc.text('Cliente Conforme', x2 + firmaW / 2, y + 10, { align: 'center' });

  // ── PIE DE PÁGINA ──
  const totalPaginas = doc.getNumberOfPages();
  for (let p = 1; p <= totalPaginas; p++) {
    doc.setPage(p);
    doc.setFillColor(10, 37, 64);
    doc.rect(0, PH - 10, PW, 10, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text(empresa, ML, PH - 4);
    doc.text(`Página ${p} / ${totalPaginas}`, PW - MR, PH - 4, { align: 'right' });
  }

  const nombreArchivo = `Reporte_${nroReporte.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`;
  doc.save(nombreArchivo);
}
</script>
</body>
</html>
